<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 420" fill="none" aria-hidden="true">
  <title>Cat in a wine barrel</title>
  <!-- Barrel -->
  <path fill="#7a5230" stroke="#3d2914" stroke-width="3" stroke-linejoin="round"
    d="M96 118c0-8 36-22 144-22s144 14 144 22v46c0 68-48 132-144 132S96 232 96 164v-46z" />
  <ellipse cx="240" cy="118" rx="144" ry="28" fill="#a67c52" stroke="#3d2914" stroke-width="3" />
  <ellipse cx="240" cy="296" rx="132" ry="26" fill="#5c3d24" stroke="#3d2914" stroke-width="2" />
  <path stroke="#3d2914" stroke-width="2" opacity="0.35" d="M120 150h240M120 190h240M120 230h200" />
  <!-- Grapes in barrel -->
  <g fill="#6b2d5c" stroke="#4a1f40" stroke-width="1">
    <circle cx="188" cy="210" r="14" /><circle cx="210" cy="200" r="14" /><circle cx="232" cy="212" r="14" />
    <circle cx="200" cy="228" r="13" /><circle cx="222" cy="232" r="13" />
  </g>
  <!-- Cat body -->
  <ellipse cx="268" cy="168" rx="52" ry="44" fill="#2a2a2a" stroke="#111" stroke-width="2" />
  <!-- Cat head -->
  <circle cx="310" cy="132" r="38" fill="#2a2a2a" stroke="#111" stroke-width="2" />
  <path fill="#2a2a2a" stroke="#111" stroke-width="2" stroke-linejoin="round"
    d="M286 98l12-28 16 24zm44-4l-8-28 20 20z" />
  <!-- Ears inner -->
  <path fill="#f4c4c8" d="M296 82l8 10-10-4zm36 6l-6 12-6-8z" />
  <!-- Face -->
  <ellipse cx="302" cy="136" rx="4" ry="6" fill="#fff" />
  <ellipse cx="322" cy="134" rx="4" ry="6" fill="#fff" />
  <ellipse cx="303" cy="138" rx="2" ry="3" fill="#111" />
  <ellipse cx="323" cy="136" rx="2" ry="3" fill="#111" />
  <path stroke="#fff" stroke-width="2" stroke-linecap="round" d="M308 152q8 6 16 0" />
  <!-- Wine glass -->
  <path stroke="#c41e3a" stroke-width="2.5" fill="rgba(196,30,58,0.25)"
