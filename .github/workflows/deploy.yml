# Deploy Next.js (Faust) frontend to a VPS over SSH.
#
# Required GitHub Actions *secrets* (Settings → Secrets and variables → Actions):
#   DEPLOY_USER       — SSH user (e.g. root or a dedicated deploy user)
#   DEPLOY_SSH_KEY    — private key (full PEM) whose public key is in ~/.ssh/authorized_keys on the server
#   FAUST_SECRET_KEY  — must match WordPress → Faust plugin → Settings → Headless
#
# Host for SSH (set at least one):
#   secrets.DEPLOY_HOST  — preferred for hostname/IP, or
#   vars.DEPLOY_HOST     — same value as a non-secret variable (fine for a droplet IP), or
#   vars.NEXT_PUBLIC_WORDPRESS_URL alone — host is derived (scheme/port/path stripped) if both are unset, or
#   workflow_dispatch inputs ssh_host / wordpress_url — one-off overrides when running the workflow manually.
#
# Required repository *variables*:
#   NEXT_PUBLIC_WORDPRESS_URL — WordPress base URL (e.g. http://YOUR_IP), not a :8080-only Next URL.
#
# Optional repository *variables*:
#   DEPLOY_PATH — absolute path to the repo on the server (default below).
#   WP_CONFIG_PATH — if WordPress wp-config.php is not at $DEPLOY_PATH/app/public/wp-config.php,
#                     set this to its absolute path on the server (backup/restore uses it).
#   WP_CONFIG_CANONICAL — optional absolute path to the real wp-config.php (e.g.
#       /etc/mowby-wines/wp-config.php). If that file exists, it is copied after git checkout
#       so production DB credentials are never only in git. If unset, the same path is used when
#       present: /etc/mowby-wines/wp-config.php
#
# First-time server: DEPLOY_PATH may not exist yet. The deploy script creates it and clones this
# repository using the workflow GITHUB_TOKEN (HTTPS). Ensure Actions → Workflow permissions allow
# read access to contents for private repos.
#
# WordPress must be fully installed (valid wp-config + DB + wp core install) and WPGraphQL active
# before deploy: otherwise GraphQL returns installer HTML and Next static export fails.
#
# If npm ci exits 137 / "Killed": the server likely ran out of RAM (OOM). This workflow
# enables a 2G swapfile when running as root on <2GiB RAM (idempotent). Or run scripts/setup-server.sh
# (CREATE_SWAP=1) or resize the droplet.

name: Deploy frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy.yml'
      - '.gitignore'
      - 'app/**'
  workflow_dispatch:
    inputs:
      ssh_host:
        description: "SSH host (IP or DNS). Use when repository variables are not wired yet."
        required: false
        default: ""
      wordpress_url:
        description: "Optional NEXT_PUBLIC_WORDPRESS_URL for this run only (e.g. http://x.x.x.x)."
        required: false
        default: ""

concurrency:
  group: deploy-mowby-frontend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Resolve SSH host
        id: resolve
        env:
          SECRET_HOST: ${{ secrets.DEPLOY_HOST }}
          VAR_DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          WP_URL: ${{ vars.NEXT_PUBLIC_WORDPRESS_URL }}
          DISPATCH_SSH: ${{ github.event.inputs.ssh_host || '' }}
          DISPATCH_WP: ${{ github.event.inputs.wordpress_url || '' }}
        run: |
          set -euo pipefail
          H="${DISPATCH_SSH:-}"
          if [ -z "$H" ]; then
            H="${SECRET_HOST:-}"
          fi
          if [ -z "$H" ]; then
            H="${VAR_DEPLOY_HOST:-}"
          fi
          if [ -z "$H" ]; then
            H="${WP_URL:-}"
            if [ -n "$H" ]; then
              H="${H#http://}"
              H="${H#https://}"
              H="${H%%/*}"
              H="${H%%:*}"
            fi
          fi
          WP_EFFECTIVE="${WP_URL:-}"
          if [ -z "$WP_EFFECTIVE" ] && [ -n "${DISPATCH_WP:-}" ]; then
            WP_EFFECTIVE="${DISPATCH_WP}"
          fi
          if [ -z "$H" ]; then
            echo 'Set secrets.DEPLOY_HOST or vars.DEPLOY_HOST (or vars.NEXT_PUBLIC_WORDPRESS_URL so the host can be derived), or run workflow_dispatch with ssh_host.' >&2
            exit 1
          fi
          echo "host=$H" >> "$GITHUB_OUTPUT"
          {
            echo "wordpress_url_effective<<__WP_EOF__"
            printf '%s' "$WP_EFFECTIVE"
            echo ""
            echo "__WP_EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          FAUST_SECRET_KEY: ${{ secrets.FAUST_SECRET_KEY }}
          NEXT_PUBLIC_WORDPRESS_URL: ${{ steps.resolve.outputs.wordpress_url_effective != '' && steps.resolve.outputs.wordpress_url_effective || vars.NEXT_PUBLIC_WORDPRESS_URL }}
          WP_CONFIG_PATH: ${{ vars.WP_CONFIG_PATH }}
          WP_CONFIG_CANONICAL: ${{ vars.WP_CONFIG_CANONICAL }}
          GIT_CLONE_URL: https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
        with:
          host: ${{ steps.resolve.outputs.host }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          command_timeout: 40m
          envs: FAUST_SECRET_KEY,NEXT_PUBLIC_WORDPRESS_URL,WP_CONFIG_PATH,WP_CONFIG_CANONICAL,GIT_CLONE_URL
          script: |
            set -euo pipefail
            DEPLOY_PATH="${{ vars.DEPLOY_PATH }}"
            if [ -z "$DEPLOY_PATH" ]; then
              DEPLOY_PATH="/var/www/mowby-wines"
            fi
            NEXT_PUBLIC_WORDPRESS_URL="$(
              printf '%s' "${NEXT_PUBLIC_WORDPRESS_URL:-}" |
                sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' -e 's/\/\+$//'
            )"
            if [ -z "$NEXT_PUBLIC_WORDPRESS_URL" ]; then
              echo "Set repository variable NEXT_PUBLIC_WORDPRESS_URL to your WordPress URL (e.g. http://YOUR_IP), not the :8080-only Next URL. Avoid leading/trailing spaces." >&2
              exit 1
            fi
            if [ "$(id -u)" -eq 0 ]; then
              MEM_KB="$(awk '/^MemTotal:/ {print $2}' /proc/meminfo)"
              if [ "${MEM_KB:-0}" -lt 2097152 ] && ! swapon --show 2>/dev/null | grep -q '/swapfile'; then
                if [ ! -f /swapfile ]; then
                  fallocate -l 2G /swapfile 2>/dev/null || dd if=/dev/zero of=/swapfile bs=1M count=2048 status=none
                  chmod 600 /swapfile
                  mkswap /swapfile
                fi
                swapon /swapfile
                grep -q '^/swapfile' /etc/fstab 2>/dev/null || echo '/swapfile none swap sw 0 0' >> /etc/fstab
              fi
            fi
            if [ -n "${WP_CONFIG_PATH:-}" ]; then
              WPCONF="$WP_CONFIG_PATH"
            else
              WPCONF="${DEPLOY_PATH}/app/public/wp-config.php"
            fi
            WPCONF_BAK="$(mktemp /tmp/mowby-wp-config.XXXXXX)"
            HAD_WPCONF=0
            if [ -f "$WPCONF" ]; then
              HAD_WPCONF=1
              cp -a "$WPCONF" "$WPCONF_BAK"
            fi
            PARENT="$(dirname "$DEPLOY_PATH")"
            mkdir -p "$PARENT"
            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              if [ -e "$DEPLOY_PATH" ]; then
                if [ -d "$DEPLOY_PATH" ] && [ -z "$(ls -A "$DEPLOY_PATH" 2>/dev/null)" ]; then
                  rmdir "$DEPLOY_PATH"
                else
                  echo "Refusing to clone: $DEPLOY_PATH exists and is not an empty git repo." >&2
                  exit 1
                fi
              fi
              git clone -b main --depth 1 "$GIT_CLONE_URL" "$DEPLOY_PATH"
            fi
            cd "$DEPLOY_PATH"
            git remote set-url origin "$GIT_CLONE_URL"
            git fetch origin main
            git checkout -B main origin/main
            CANONICAL="${WP_CONFIG_CANONICAL:-}"
            if [ -z "$CANONICAL" ] && [ -f /etc/mowby-wines/wp-config.php ]; then
              CANONICAL=/etc/mowby-wines/wp-config.php
            fi
            if [ -n "$CANONICAL" ] && [ -f "$CANONICAL" ]; then
              mkdir -p "$(dirname "$WPCONF")"
              cp -a "$CANONICAL" "$WPCONF"
              rm -f "$WPCONF_BAK"
              if ! grep -q 'DB_NAME' "$WPCONF"; then
                echo "Canonical wp-config at $CANONICAL did not produce a valid $WPCONF (missing DB_NAME)." >&2
                exit 1
              fi
            elif [ "$HAD_WPCONF" -eq 1 ]; then
              cp -a "$WPCONF_BAK" "$WPCONF"
              rm -f "$WPCONF_BAK"
              if ! grep -q 'DB_NAME' "$WPCONF"; then
                echo "Restored wp-config.php at $WPCONF does not look valid (missing DB_NAME)." >&2
                exit 1
              fi
            else
              rm -f "$WPCONF_BAK"
            fi
            {
              printf '%s\n' "FAUST_SECRET_KEY=${FAUST_SECRET_KEY}"
              printf '%s\n' "NEXT_PUBLIC_WORDPRESS_URL=${NEXT_PUBLIC_WORDPRESS_URL}"
            } > frontend/.env.local
            WP_DOCROOT="${DEPLOY_PATH}/app/public"
            WP_CLI_URL="${NEXT_PUBLIC_WORDPRESS_URL%/}"
            GQ_URL="${WP_CLI_URL}/index.php?graphql"
            probe_graphql() {
              GQ_TMP="$(mktemp)"
              # -L follows redirects; GraphQL must return JSON (WP may emit HTML/warnings if misconfigured).
              if ! curl -sS -L -m 45 -o "$GQ_TMP" -w '' \
                -H 'Content-Type: application/json' \
                -H 'Accept: application/json' \
                -d '{"query":"{ __typename }"}' "$GQ_URL"; then
                echo "Could not reach GraphQL at $GQ_URL (curl failed)." >&2
                rm -f "$GQ_TMP"
                return 1
              fi
              if grep -qiE 'wp-core-ui|Welcome to WordPress\. Before getting started|<!DOCTYPE[[:space:]]+html' "$GQ_TMP" 2>/dev/null; then
                echo "GraphQL URL returned WordPress installer HTML, not JSON. Install WordPress and WPGraphQL first." >&2
                echo "URL was: $GQ_URL" >&2
                rm -f "$GQ_TMP"
                return 1
              fi
              if grep -qiE 'PHP (Warning|Fatal error|Parse error)' "$GQ_TMP" 2>/dev/null; then
                echo "GraphQL body contains PHP errors (display_errors may be on). Body (first 600 chars):" >&2
                head -c 600 "$GQ_TMP" >&2 || true
                echo >&2
                echo "Turn off display_errors for production PHP, or fix the underlying PHP notice." >&2
                rm -f "$GQ_TMP"
                return 1
              fi
              if ! grep -qE '"data"|"errors"' "$GQ_TMP" 2>/dev/null; then
                echo "GraphQL response from $GQ_URL did not look like JSON. Body (first 500 chars):" >&2
                head -c 500 "$GQ_TMP" >&2 || true
                echo >&2
                rm -f "$GQ_TMP"
                return 1
              fi
              rm -f "$GQ_TMP"
              return 0
            }
            if command -v wp >/dev/null 2>&1; then
              if [ "$(id -u)" -eq 0 ]; then
                WP_CLI=(wp --allow-root)
              else
                WP_CLI=(wp)
              fi
              WP_DIAG="$(mktemp)"
              if "${WP_CLI[@]}" core is-installed --path="$WP_DOCROOT" --url="$WP_CLI_URL" 2>"$WP_DIAG"; then
                rm -f "$WP_DIAG"
              else
                echo "wp core is-installed failed for $WP_DOCROOT. wp-cli messages:" >&2
                cat "$WP_DIAG" >&2 || true
                rm -f "$WP_DIAG"
                echo "Trying GraphQL probe at $GQ_URL (Faust build needs this to succeed)..." >&2
                if ! probe_graphql; then
                  echo "Fix wp-config.php + database + run wp-admin install or: wp core install ..." >&2
                  exit 1
                fi
                echo "GraphQL probe OK; continuing deploy." >&2
              fi
            else
              if ! probe_graphql; then
                exit 1
              fi
            fi
            # Full GraphQL schema for Next static generation: active child theme (ACF rules), ACF + WPGraphQL + WPGraphQL for ACF + Faust.
            if command -v wp >/dev/null 2>&1; then
              if [ "$(id -u)" -eq 0 ]; then
                WP_CLI=(wp --allow-root)
              else
                WP_CLI=(wp)
              fi
              echo "Ensuring WordPress theme and headless plugins are active..." >&2
              if ! "${WP_CLI[@]}" theme activate mowby-wines --path="$WP_DOCROOT" --url="$WP_CLI_URL"; then
                echo "theme activate mowby-wines failed (parent theme missing or path wrong?). Fix WP before deploy." >&2
                exit 1
              fi
              if ! "${WP_CLI[@]}" plugin activate advanced-custom-fields-pro wp-graphql wpgraphql-acf faustwp \
                --path="$WP_DOCROOT" --url="$WP_CLI_URL"; then
                echo "plugin activate failed. Required: advanced-custom-fields-pro, wp-graphql, wpgraphql-acf, faustwp." >&2
                echo "Run: ${WP_CLI[*]} plugin list --path=\"$WP_DOCROOT\" --status=inactive" >&2
                exit 1
              fi
            fi
            cd frontend
            export NPM_CONFIG_MAXSOCKETS=5
            npm ci --no-audit --no-fund
            npm run build -- --skip-health-checks
            pm2 delete mowby-frontend 2>/dev/null || true
            pm2 start npm --name mowby-frontend --cwd "$DEPLOY_PATH/frontend" -- start -- --skip-health-checks
            pm2 save
