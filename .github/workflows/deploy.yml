# Deploy Next.js (Faust) frontend to a VPS over SSH.
#
# Required GitHub Actions *secrets* (Settings → Secrets and variables → Actions):
#   DEPLOY_USER       — SSH user (e.g. root or a dedicated deploy user)
#   DEPLOY_SSH_KEY    — private key (full PEM) whose public key is in ~/.ssh/authorized_keys on the server
#   FAUST_SECRET_KEY  — must match WordPress → Faust plugin → Settings → Headless
#
# Host for SSH (set at least one):
#   secrets.DEPLOY_HOST  — preferred for hostname/IP, or
#   vars.DEPLOY_HOST     — same value as a non-secret variable (fine for a droplet IP), or
#   vars.NEXT_PUBLIC_WORDPRESS_URL alone — host is derived (scheme/port/path stripped) if both are unset, or
#   workflow_dispatch inputs ssh_host / wordpress_url — one-off overrides when running the workflow manually.
#
# Required repository *variables*:
#   NEXT_PUBLIC_WORDPRESS_URL — WordPress base URL (e.g. http://YOUR_IP), not a :8080-only Next URL.
#
# Optional repository *variables*:
#   DEPLOY_PATH — absolute path to the repo on the server (default below).
#   WP_CONFIG_PATH — if WordPress wp-config.php is not at $DEPLOY_PATH/app/public/wp-config.php,
#                     set this to its absolute path on the server (backup/restore uses it).
#   WP_CONFIG_CANONICAL — optional absolute path to the real wp-config.php (e.g.
#       /etc/mowby-wines/wp-config.php). If that file exists, it is copied after git checkout
#       so production DB credentials are never only in git. If unset, the same path is used when
#       present: /etc/mowby-wines/wp-config.php
#
# If npm ci exits 137 / "Killed": the server likely ran out of RAM (OOM). This workflow
# enables a 2G swapfile when running as root on <2GiB RAM (idempotent). Or run scripts/setup-server.sh
# (CREATE_SWAP=1) or resize the droplet.

name: Deploy frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy.yml'
      - '.gitignore'
      - 'app/**'
  workflow_dispatch:
    inputs:
      ssh_host:
        description: "SSH host (IP or DNS). Use when repository variables are not wired yet."
        required: false
        default: ""
      wordpress_url:
        description: "Optional NEXT_PUBLIC_WORDPRESS_URL for this run only (e.g. http://x.x.x.x)."
        required: false
        default: ""

concurrency:
  group: deploy-mowby-frontend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Resolve SSH host
        id: resolve
        env:
          SECRET_HOST: ${{ secrets.DEPLOY_HOST }}
          VAR_DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          WP_URL: ${{ vars.NEXT_PUBLIC_WORDPRESS_URL }}
          DISPATCH_SSH: ${{ github.event.inputs.ssh_host || '' }}
          DISPATCH_WP: ${{ github.event.inputs.wordpress_url || '' }}
          GITHUB_EVENT: ${{ github.event_name }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          #region agent log
          mkdir -p "$GITHUB_WORKSPACE/.cursor"
          _log="$GITHUB_WORKSPACE/.cursor/debug-738f4f.log"
          python3 - << PY
          import json, os, time
          log_path = os.path.join(os.environ["GITHUB_WORKSPACE"], ".cursor", "debug-738f4f.log")
          os.makedirs(os.path.dirname(log_path), exist_ok=True)
          data = {
            "sessionId": "738f4f",
            "timestamp": int(time.time() * 1000),
            "hypothesisId": "H1-H5",
            "location": "deploy.yml:Resolve SSH host",
            "message": "source lengths; 0 len on vars.* often means Environment-only vars without job environment:",
            "data": {
              "event": os.environ.get("GITHUB_EVENT", ""),
              "repo": os.environ.get("GITHUB_REPO", ""),
              "secret_deploy_host_len": len(os.environ.get("SECRET_HOST", "")),
              "var_deploy_host_len": len(os.environ.get("VAR_DEPLOY_HOST", "")),
              "var_wp_url_len": len(os.environ.get("WP_URL", "")),
              "dispatch_ssh_len": len(os.environ.get("DISPATCH_SSH", "")),
              "dispatch_wp_len": len(os.environ.get("DISPATCH_WP", "")),
            },
          }
          line = json.dumps(data)
          with open(log_path, "a") as f:
            f.write(line + "\n")
          print("AGENT_DEBUG_738f4f " + line, flush=True)
          PY
          _slen="${#SECRET_HOST}"
          _vlen="${#VAR_DEPLOY_HOST}"
          _wlen="${#WP_URL}"
          _dlen="${#DISPATCH_SSH}"
          _pwlen="${#DISPATCH_WP}"
          {
            echo "## Debug 738f4f: SSH host resolution"
            echo "| Source | char length |"
            echo "|--------|------------|"
            echo "| secrets.DEPLOY_HOST | ${_slen} (hidden) |"
            echo "| vars.DEPLOY_HOST | ${_vlen} |"
            echo "| vars.NEXT_PUBLIC_WORDPRESS_URL | ${_wlen} |"
            echo "| workflow_dispatch ssh_host | ${_dlen} |"
            echo "| workflow_dispatch wordpress_url | ${_pwlen} |"
            echo ""
            echo "If \`vars.*\` lengths are 0 but you set values under **Environments**, add \`environment: <name>\` to this job or move variables to **Repository** variables."
          } >> "$GITHUB_STEP_SUMMARY"
          #endregion
          H="${DISPATCH_SSH:-}"
          if [ -z "$H" ]; then
            H="${SECRET_HOST:-}"
          fi
          if [ -z "$H" ]; then
            H="${VAR_DEPLOY_HOST:-}"
          fi
          if [ -z "$H" ]; then
            H="${WP_URL:-}"
            if [ -n "$H" ]; then
              H="${H#http://}"
              H="${H#https://}"
              H="${H%%/*}"
              H="${H%%:*}"
            fi
          fi
          WP_EFFECTIVE="${WP_URL:-}"
          if [ -z "$WP_EFFECTIVE" ] && [ -n "${DISPATCH_WP:-}" ]; then
            WP_EFFECTIVE="${DISPATCH_WP}"
          fi
          if [ -z "$H" ]; then
            echo 'Set secrets.DEPLOY_HOST or vars.DEPLOY_HOST (or vars.NEXT_PUBLIC_WORDPRESS_URL so the host can be derived), or run workflow_dispatch with ssh_host.' >&2
            exit 1
          fi
          echo "host=$H" >> "$GITHUB_OUTPUT"
          {
            echo "wordpress_url_effective<<__WP_EOF__"
            printf '%s' "$WP_EFFECTIVE"
            echo ""
            echo "__WP_EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          FAUST_SECRET_KEY: ${{ secrets.FAUST_SECRET_KEY }}
          NEXT_PUBLIC_WORDPRESS_URL: ${{ steps.resolve.outputs.wordpress_url_effective != '' && steps.resolve.outputs.wordpress_url_effective || vars.NEXT_PUBLIC_WORDPRESS_URL }}
          WP_CONFIG_PATH: ${{ vars.WP_CONFIG_PATH }}
          WP_CONFIG_CANONICAL: ${{ vars.WP_CONFIG_CANONICAL }}
        with:
          host: ${{ steps.resolve.outputs.host }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          command_timeout: 40m
          envs: FAUST_SECRET_KEY,NEXT_PUBLIC_WORDPRESS_URL,WP_CONFIG_PATH,WP_CONFIG_CANONICAL
          script: |
            set -euo pipefail
            DEPLOY_PATH="${{ vars.DEPLOY_PATH }}"
            if [ -z "$DEPLOY_PATH" ]; then
              DEPLOY_PATH="/var/www/mowby-wines"
            fi
            if [ -z "${NEXT_PUBLIC_WORDPRESS_URL:-}" ]; then
              echo "Set repository variable NEXT_PUBLIC_WORDPRESS_URL to your WordPress URL (e.g. http://YOUR_IP), not the :8080-only Next URL." >&2
              exit 1
            fi
            if [ "$(id -u)" -eq 0 ]; then
              MEM_KB="$(awk '/^MemTotal:/ {print $2}' /proc/meminfo)"
              if [ "${MEM_KB:-0}" -lt 2097152 ] && ! swapon --show 2>/dev/null | grep -q '/swapfile'; then
                if [ ! -f /swapfile ]; then
                  fallocate -l 2G /swapfile 2>/dev/null || dd if=/dev/zero of=/swapfile bs=1M count=2048 status=none
                  chmod 600 /swapfile
                  mkswap /swapfile
                fi
                swapon /swapfile
                grep -q '^/swapfile' /etc/fstab 2>/dev/null || echo '/swapfile none swap sw 0 0' >> /etc/fstab
              fi
            fi
            if [ -n "${WP_CONFIG_PATH:-}" ]; then
              WPCONF="$WP_CONFIG_PATH"
            else
              WPCONF="${DEPLOY_PATH}/app/public/wp-config.php"
            fi
            WPCONF_BAK="$(mktemp /tmp/mowby-wp-config.XXXXXX)"
            HAD_WPCONF=0
            if [ -f "$WPCONF" ]; then
              HAD_WPCONF=1
              cp -a "$WPCONF" "$WPCONF_BAK"
            fi
            cd "$DEPLOY_PATH"
            git fetch origin main
            git checkout -B main origin/main
            CANONICAL="${WP_CONFIG_CANONICAL:-}"
            if [ -z "$CANONICAL" ] && [ -f /etc/mowby-wines/wp-config.php ]; then
              CANONICAL=/etc/mowby-wines/wp-config.php
            fi
            if [ -n "$CANONICAL" ] && [ -f "$CANONICAL" ]; then
              mkdir -p "$(dirname "$WPCONF")"
              cp -a "$CANONICAL" "$WPCONF"
              rm -f "$WPCONF_BAK"
              if ! grep -q 'DB_NAME' "$WPCONF"; then
                echo "Canonical wp-config at $CANONICAL did not produce a valid $WPCONF (missing DB_NAME)." >&2
                exit 1
              fi
            elif [ "$HAD_WPCONF" -eq 1 ]; then
              cp -a "$WPCONF_BAK" "$WPCONF"
              rm -f "$WPCONF_BAK"
              if ! grep -q 'DB_NAME' "$WPCONF"; then
                echo "Restored wp-config.php at $WPCONF does not look valid (missing DB_NAME)." >&2
                exit 1
              fi
            else
              rm -f "$WPCONF_BAK"
            fi
            {
              printf '%s\n' "FAUST_SECRET_KEY=${FAUST_SECRET_KEY}"
              printf '%s\n' "NEXT_PUBLIC_WORDPRESS_URL=${NEXT_PUBLIC_WORDPRESS_URL}"
            } > frontend/.env.local
            cd frontend
            export NPM_CONFIG_MAXSOCKETS=5
            npm ci --no-audit --no-fund
            npm run build -- --skip-health-checks
            pm2 delete mowby-frontend 2>/dev/null || true
            pm2 start npm --name mowby-frontend --cwd "$DEPLOY_PATH/frontend" -- start -- --skip-health-checks
            pm2 save

      - name: Upload agent debug log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-session-738f4f
          path: .cursor/debug-738f4f.log
          if-no-files-found: ignore
